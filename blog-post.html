<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foster Health | Article</title>
  <meta name="description"
    content="Foster Health insights on MDS workflows, reimbursement, and skilled nursing operations." />
  <link rel="icon" type="image/svg+xml" href="./img/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <script>
    window.tailwind = window.tailwind || {};
    window.tailwind.config = {
      theme: {
        extend: {
          colors: {
            ink: "#112036",
            muted: "#516178",
            line: "#dce4ee",
            primary: "#0f6e95",
            "primary-dark": "#085a7a",
            accent: "#1fa27d",
            "accent-soft": "#e8f8f3",
            surface: "#ffffff",
            sand: "#f9fbfd",
          },
          boxShadow: {
            soft: "0 16px 40px rgba(22, 40, 66, 0.1)",
            panel: "0 30px 70px rgba(10, 36, 60, 0.12)",
          },
          fontFamily: {
            display: ["Space Grotesk", "sans-serif"],
            body: ["Source Sans 3", "sans-serif"],
          },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="./css/styles.css" />
</head>

<body class="bg-transparent font-body text-ink">
  <div class="mx-auto w-full max-w-screen-2xl px-5 py-5 lg:px-8">
    <header
      class="site-header sticky top-3 z-20 flex items-center justify-between rounded-2xl border border-white/70 bg-white/90 shadow-soft backdrop-blur">
      <div class="flex w-full items-center justify-between px-4 py-3 lg:px-6">
        <a class="site-brand font-display flex items-center gap-3 font-bold tracking-[0.01em]" href="/">
          <span class="brand-mark" aria-hidden="true"></span>
          Foster Health
        </a>

        <!-- Hamburger Button -->
        <button id="menu-toggle"
          class="flex h-10 w-10 flex-col items-center justify-center gap-1.5 rounded-xl border border-line bg-white shadow-sm transition-all hover:bg-sand md:hidden"
          aria-label="Toggle Menu" aria-expanded="false">
          <span class="h-0.5 w-5 rounded-full bg-black transition-all duration-300"></span>
          <span class="h-0.5 w-5 rounded-full bg-black transition-all duration-300"></span>
          <span class="h-0.5 w-5 rounded-full bg-black transition-all duration-300"></span>
        </button>

        <nav class="site-nav hidden items-center gap-6 md:flex" aria-label="Primary">
          <a class="site-nav-link font-semibold text-muted transition hover:text-ink" href="/for-clinicians">For
            Clinicians</a>
          <a class="site-nav-link font-semibold text-muted transition hover:text-ink" href="/for-execs">For Execs</a>
          <a class="site-nav-link font-semibold text-muted transition hover:text-ink" href="/pricing">Pricing</a>
          <a class="site-nav-link font-semibold text-muted transition hover:text-ink" href="/team">Team</a>
          <!-- <a class="site-nav-link font-semibold text-ink" href="/blog">Blog</a> -->
          <a class="site-nav-cta font-display rounded-full bg-[#112036] font-bold text-white transition hover:bg-[#081727]"
            href="https://calendly.com/pranav-fosterhealth/30min" target="_blank" rel="noreferrer">
            Request Demo
          </a>
        </nav>
      </div>

      <!-- Mobile Menu -->
      <div id="mobile-menu"
        class="absolute left-0 right-0 top-full mt-2 hidden origin-top scale-95 flex-col gap-2 rounded-2xl border border-line bg-white p-4 opacity-0 shadow-panel transition-all duration-300 md:hidden">
        <a class="rounded-xl px-4 py-3 font-semibold text-muted transition hover:bg-sand hover:text-ink"
          href="/for-clinicians">For Clinicians</a>
        <a class="rounded-xl px-4 py-3 font-semibold text-muted transition hover:bg-sand hover:text-ink"
          href="/for-execs">For Execs</a>
        <a class="rounded-xl px-4 py-3 font-semibold text-muted transition hover:bg-sand hover:text-ink"
          href="/pricing">Pricing</a>
        <a class="rounded-xl px-4 py-3 font-semibold text-muted transition hover:bg-sand hover:text-ink" href="/team">Team</a>
        <!-- <a class="rounded-xl px-4 py-3 font-semibold text-ink transition hover:bg-sand" href="/blog">Blog</a> -->
        <div class="mt-2 border-t border-line pt-2">
          <a class="site-nav-cta font-display block rounded-xl bg-[#112036] px-4 py-4 text-center font-bold text-white transition hover:bg-[#081727]"
            href="https://calendly.com/pranav-fosterhealth/30min" target="_blank" rel="noreferrer">
            Request Demo
          </a>
        </div>
      </div>
    </header>

    <main class="space-y-6 lg:space-y-8">
      <section id="postStatus" class="rise-in mt-6 hidden rounded-[24px] border p-5 shadow-soft"></section>

      <article class="rise-in mt-6 overflow-hidden rounded-[28px] border border-line bg-surface shadow-panel">
        <div id="articleShell" class="blog-post-shell hidden">
          <div class="border-b border-line/80 bg-[linear-gradient(135deg,#f8fcff_0%,#ffffff_55%,#eff9f4_100%)] px-6 py-8 lg:px-10 lg:py-10">
            <a class="text-sm font-bold text-primary transition hover:text-primary-dark" href="/blog">
              ← Back to Blog
            </a>
            <div class="mt-5 max-w-4xl">
              <div id="postChips" class="flex flex-wrap gap-2"></div>
              <h1 id="postTitle" class="font-display mt-4 text-[clamp(2.2rem,4vw,4.4rem)] leading-[1.02]"></h1>
              <p id="postExcerpt" class="mt-4 max-w-3xl text-lg leading-8 text-muted"></p>
              <div id="postMeta" class="mt-6 flex flex-wrap gap-x-6 gap-y-2 text-sm font-semibold text-[#35506b]"></div>
            </div>
          </div>
          <div id="postHeroWrap" class="border-b border-line/80 px-6 py-6 lg:px-10"></div>
          <div class="px-6 py-8 lg:px-10 lg:py-10">
            <div id="postBody" class="blog-body max-w-3xl"></div>
          </div>
        </div>
      </article>
    </main>
  </div>

  <script src="./js/sanity-site-config.js"></script>
  <script src="./js/sanity-client.js"></script>
  <script src="./js/blog-post.js"></script>
  <script src="./js/navbar.js"></script>
</body>

</html>
